<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="菜单栏入口示意图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1e6"/>
      <stop offset="1" stop-color="#eadfcd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1d251f" flood-opacity="0.22"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans CJK SC", "Helvetica Neue", sans-serif; fill: #202b23; }
      .title { font-size: 42px; font-weight: 800; }
      .subtitle { font-size: 20px; fill: #637062; }
      .bar { fill: #f9faf7; stroke: #c9d2c2; stroke-width: 2; }
      .menu { fill: #ffffff; stroke: #c4cfbd; stroke-width: 2; }
      .item { font-size: 22px; font-weight: 700; }
      .hint { font-size: 16px; fill: #647165; }
      .status { font-size: 20px; font-weight: 800; fill: #ffffff; }
      .pill { fill: #27332c; }
      .rowLine { stroke: #e0e6dc; stroke-width: 2; }
      .check { fill: #3d7d48; font-size: 20px; font-weight: 800; }
    </style>
  </defs>

  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <text x="78" y="80" class="title">菜单栏与验收入口</text>
  <text x="80" y="118" class="subtitle">连接状态、电量、权限和蓝牙设置都集中在菜单栏</text>

  <g filter="url(#shadow)">
    <rect x="128" y="178" width="1024" height="80" rx="30" class="bar"/>
    <circle cx="170" cy="218" r="13" fill="#ff5f57"/>
    <circle cx="208" cy="218" r="13" fill="#ffbd2e"/>
    <circle cx="246" cy="218" r="13" fill="#28c840"/>
    <rect x="892" y="196" width="148" height="44" rx="22" class="pill"/>
    <text x="966" y="225" text-anchor="middle" class="status">Joy-Con on</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="276" width="392" height="270" rx="28" class="menu"/>
    <text x="796" y="326" class="item">Open Accessibility Settings</text>
    <text x="796" y="354" class="hint">授权键盘事件注入 Codex</text>
    <line x1="786" y1="382" x2="1128" y2="382" class="rowLine"/>
    <text x="796" y="430" class="item">Open Bluetooth Settings</text>
    <text x="796" y="458" class="hint">连接、断开或重连 Joy-Con</text>
    <line x1="786" y1="486" x2="1128" y2="486" class="rowLine"/>
    <text x="796" y="532" class="item">Quit JoyConCodexHelper</text>
  </g>

  <g>
    <rect x="128" y="310" width="480" height="188" rx="28" fill="#ffffff" stroke="#c4cfbd" stroke-width="2"/>
    <text x="164" y="356" class="item">验收信号</text>
    <text x="164" y="400" class="check">✓ Home 会打印 recovery scan 日志</text>
    <text x="164" y="436" class="check">✓ R3 会打印 Plan mode toggle 日志</text>
    <text x="164" y="472" class="check">✓ 普通方向键和删除不刷屏</text>
  </g>

  <rect x="274" y="598" width="732" height="46" rx="23" fill="#ffffff" stroke="#c4cfbd" stroke-width="2"/>
  <text x="640" y="627" text-anchor="middle" class="hint">日志入口：jch logs，文件位置：~/Library/Logs/JoyConCodexHelper.log</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="基于真实右手 Joy-Con 原图的键位标注">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f1e5"/>
      <stop offset="1" stop-color="#e5f0e1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#20271f" flood-opacity="0.18"/>
    </filter>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="4" fill="#4f684f"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Noto Sans CJK SC", "Helvetica Neue", sans-serif; fill: #243126; }
      .title { font-size: 40px; font-weight: 800; }
      .subtitle { font-size: 20px; fill: #5f6c61; }
      .panel { fill: rgba(255,253,248,0.92); stroke: #c2ceb9; stroke-width: 2; }
      .callout { fill: rgba(255,255,255,0.96); stroke: #bac8b4; stroke-width: 2; }
      .label { font-size: 18px; font-weight: 800; }
      .small { font-size: 15px; fill: #5f6c61; }
      .credit { font-size: 12px; fill: #748173; }
      .line { stroke: #4f684f; stroke-width: 3; fill: none; stroke-linecap: round; marker-end: url(#dot); }
      .chip { fill: #26332d; }
      .chiptext { fill: #fff; font-size: 14px; font-weight: 800; }
    </style>
  </defs>

  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <text x="72" y="72" class="title">右手 Joy-Con 默认键位</text>
  <text x="72" y="108" class="subtitle">基于真实右手 Joy-Con 资源图标注</text>

  <g filter="url(#shadow)">
    <rect x="430" y="124" width="420" height="576" rx="34" class="panel"/>
    <image href="vendor/nintendo-joycon-right-front.png" x="545" y="128" width="197" height="560"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="902" y="126" width="306" height="126" rx="28" class="panel"/>
    <text x="928" y="156" class="label">顶视图</text>
    <rect x="928" y="172" width="96" height="28" rx="14" class="chip"/>
    <text x="976" y="191" text-anchor="middle" class="chiptext">ZR</text>
    <rect x="928" y="206" width="96" height="28" rx="14" class="chip"/>
    <text x="976" y="225" text-anchor="middle" class="chiptext">R</text>
    <text x="1052" y="190" class="small">ZR 长按语音输入</text>
    <text x="1052" y="220" class="small">R 确认 / 回车</text>
  </g>

  <rect x="72" y="152" width="284" height="88" rx="22" class="callout"/>
  <text x="96" y="186" class="label">+：删除左侧字符</text>
  <text x="96" y="214" class="small">支持长按连续 Backspace</text>
  <path class="line" d="M 356 196 C 428 196 476 194 590 188"/>

  <rect x="72" y="300" width="284" height="108" rx="22" class="callout"/>
  <text x="96" y="336" class="label">Y / X / B / A</text>
  <text x="96" y="365" class="small">左 / 上 / 下 / 右</text>
  <text x="96" y="392" class="small">用于 Plan 选项与文本光标</text>
  <path class="line" d="M 356 354 C 434 354 500 320 644 274"/>

  <rect x="72" y="468" width="284" height="88" rx="22" class="callout"/>
  <text x="96" y="502" class="label">R3：切换 Plan mode</text>
  <text x="96" y="530" class="small">按下右摇杆，当前依赖 Shift + Tab</text>
  <path class="line" d="M 356 512 C 442 500 516 466 644 429"/>

  <rect x="924" y="262" width="284" height="88" rx="22" class="callout"/>
  <text x="948" y="296" class="label">Home：恢复扫描</text>
  <text x="948" y="324" class="small">触发 controller recovery scan</text>
  <path class="line" d="M 924 314 C 860 314 780 388 614 531"/>

  <rect x="924" y="402" width="284" height="88" rx="22" class="callout"/>
  <text x="948" y="436" class="label">右摇杆方向 / SL / SR</text>
  <text x="948" y="464" class="small">默认禁用，避免误触</text>

 </svg>
